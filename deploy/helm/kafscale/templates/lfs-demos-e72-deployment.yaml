{{- if and .Values.lfsDemos.enabled .Values.lfsDemos.e72Browser.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kafscale.componentName" (dict "root" . "component" "lfs-demo-e72") }}
  labels:
{{ include "kafscale.labels" . | indent 4 }}
    app.kubernetes.io/component: lfs-demo-e72
spec:
  replicas: 1
  selector:
    matchLabels:
{{ include "kafscale.componentSelectorLabels" (dict "root" . "component" "lfs-demo-e72") | indent 6 }}
  template:
    metadata:
      labels:
{{ include "kafscale.componentSelectorLabels" (dict "root" . "component" "lfs-demo-e72") | indent 8 }}
    spec:
{{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{- range .Values.imagePullSecrets }}
        - name: {{ . }}
{{- end }}
{{- end }}
      containers:
        - name: nginx
          image: "{{ .Values.lfsDemos.e72Browser.image.repository }}:{{ ternary "latest" (default .Chart.AppVersion .Values.lfsDemos.e72Browser.image.tag) .Values.lfsDemos.e72Browser.image.useLatest }}"
          imagePullPolicy: {{ .Values.lfsDemos.e72Browser.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: {{ include "kafscale.componentName" (dict "root" . "component" "lfs-demo-e72") }}
{{- end }}
