imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

operator:
  replicaCount: 1
  image:
    repository: ghcr.io/kafscale/kafscale-operator
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  brokerImage:
    repository: ghcr.io/kafscale/kafscale-broker
    tag: ""
    useLatest: false
  etcdSnapshotEtcdctlImage:
    repository: ghcr.io/kafscale/kafscale-etcd-tools
    tag: ""
    useLatest: false
  etcdReplicas: 3
  etcdStorageSize: ""
  etcdStorageClass: ""
  etcdStorageMemory: false
  etcdEndpoints:
    - "http://etcd:2379"
  leaderKey: "kafscale-operator"
  acl:
    enabled: false
    configJson: ""
    configFile: ""
    failOpen: false
  auth:
    principalSource: ""
    proxyProtocol: false
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  metrics:
    enabled: true
    port: 8080
    service:
      annotations: {}
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
    prometheusRule:
      enabled: false
      labels: {}

console:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/kafscale/kafscale-console
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  auth:
    username: ""
    password: ""
  etcdEndpoints: []
  etcd:
    username: ""
    password: ""
  metrics:
    brokerMetricsURL: ""
    operatorMetricsURL: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: console.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

proxy:
  enabled: false
  replicaCount: 2
  image:
    repository: ghcr.io/kafscale/kafscale-proxy
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  health:
    enabled: true
    port: 9094
  backendCacheTTLSeconds: 60
  advertisedHost: ""
  advertisedPort: 9092
  etcdEndpoints: []
  etcd:
    username: ""
    password: ""
  backends: []
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: LoadBalancer
    port: 9092
    annotations: {}
    loadBalancerSourceRanges: []

lfsProxy:
  enabled: false
  replicaCount: 2
  image:
    repository: ghcr.io/kafscale/kafscale-lfs-proxy
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  health:
    enabled: true
    port: 9094
  metrics:
    enabled: true
    port: 9095
    service:
      annotations: {}
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
    prometheusRule:
      enabled: false
      labels: {}
  http:
    enabled: false  # Disabled by default for security; enable with apiKey set
    port: 8080
    apiKey: ""  # Required when http.enabled=true
  backendCacheTTLSeconds: 60
  advertisedHost: ""
  advertisedPort: 9092
  etcdEndpoints: []
  etcd:
    username: ""
    password: ""
  backends: []
  s3:
    bucket: ""
    region: ""
    endpoint: ""
    # Credentials: use existingSecret (preferred) or inline values (not recommended)
    existingSecret: ""  # Name of existing Secret with AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY keys
    accessKey: ""       # Deprecated: use existingSecret instead
    secretKey: ""       # Deprecated: use existingSecret instead
    sessionToken: ""
    forcePathStyle: false
    ensureBucket: false
    maxBlobSize: 5368709120
    chunkSize: 5242880
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP  # Changed from LoadBalancer for security; use Ingress for external access
    port: 9092
    annotations: {}
    loadBalancerSourceRanges: []

mcp:
  enabled: false
  namespace:
    name: kafscale-mcp
    create: true
  replicaCount: 1
  image:
    repository: ghcr.io/kafscale/kafscale-mcp
    tag: ""
    useLatest: false
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""
  auth:
    token: ""
  etcdEndpoints: []
  etcd:
    username: ""
    password: ""
  metrics:
    brokerMetricsURL: ""
  sessionTimeout: ""
  podAnnotations: {}
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: mcp.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
    
